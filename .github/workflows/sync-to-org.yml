name: org 저장소 미러

# main 에 push(=PR 머지 포함)되면 org 저장소로 전체 히스토리를 그대로 push 합니다.
on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃 (전체 히스토리)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: org 저장소로 push
        run: |
          git push \
            "https://x-access-token:${{ secrets.ORG_PUSH_TOKEN }}@github.com/SKNETWORKS-FAMILY-AICAMP/SKN30-3rd-4Team.git" \
            HEAD:main
