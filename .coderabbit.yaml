# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# ================================================================ #
#                    🐰 CodeRabbit 설정 파일                        #
#            전·월세 분쟁 팩트체커 (SKN30-3rd-4Team)                #
# ================================================================ #

language: "ko-KR"
early_access: false

tone_instructions: >
  1. 단순히 문제를 지적하는 데 그치지 말고, 왜 문제인지 원인까지 설명해주세요.
  2. 더 나은 코드를 작성할 수 있도록 관련 레퍼런스나 공식 문서를 함께 제안해주세요.
  3. 잘된 부분은 가볍고 유쾌하게 칭찬해주세요.
  4. 전반적으로 함께 성장하는 동료 개발자처럼 피드백해주세요.

# ================================================================ #
#                        리뷰 상세 설정                              #
# ================================================================ #
reviews:
  profile: "chill"
  request_changes_workflow: false

  high_level_summary: true
  changed_files_summary: true
  review_status: true
  collapse_walkthrough: true
  sequence_diagrams: true
  poem: true

  # -------------------------------------------------------------- #
  #                        리뷰 제외 경로                            #
  # -------------------------------------------------------------- #
  path_filters:
    - "!.claude/**"        # Claude Code 설정 (자동 생성)
    - "!memory/**"         # Claude 자동 메모리
    - "!data/**"           # 원본 문서·임베딩 등 데이터 산출물
    - "!**/*.lock"         # uv.lock 등 lock 파일

  # -------------------------------------------------------------- #
  #                       경로별 리뷰 지침                           #
  # -------------------------------------------------------------- #
  path_instructions:
    - path: "src/**"
      instructions: |
        RAG/에이전트 핵심 로직입니다. 다음을 확인해주세요:
        1. OpenAI/LangSmith 키 등 비밀값이 하드코딩되지 않았는지 (.env 사용 확인)
        2. 체인·그래프 노드의 입출력 타입과 예외 처리가 명확한지
        3. PDF·이미지 등 외부 입력에 대한 검증이 있는지

    - path: "app/**"
      instructions: |
        Streamlit UI 코드입니다. 다음을 확인해주세요:
        1. 사용자 입력(업로드 파일 등) 검증과 에러 메시지가 친절한지
        2. 비즈니스 로직이 src/ 로 분리되어 있는지 (UI에 로직 혼재 지양)

    - path: "docs/**"
      instructions: |
        프로젝트 문서입니다. 설계 결정이 근거와 함께 기록되었는지,
        기술 스택 변경 시 README와 함께 업데이트되었는지 확인해주세요.

  # -------------------------------------------------------------- #
  #                      PR 병합 전 검증                             #
  # -------------------------------------------------------------- #
  pre_merge_checks:
    description:
      mode: warning
      requirements: |
        PR 본문은 다음 구조를 따라야 합니다:
        - 📌 배경 (왜 이 작업을 하는지)
        - ✅ 수정 내역 (무엇을 바꿨는지)
        - 📸 스크린샷 (UI 변경이 있는 경우)

    custom_checks:
      - name: "한글 Conventional Commits 형식"
        mode: warning
        instructions: |
          모든 커밋 메시지가 다음 형식을 따르는지 확인하세요:
          '<type>: <한글 설명>' (예: feat: 등기부 분석 기능 추가)
          허용 타입: feat, fix, refactor, chore, docs, test, style, perf
          영문 설명이거나 type prefix가 없는 커밋이 있으면 경고하세요.

  # -------------------------------------------------------------- #
  #                        자동 리뷰 설정                            #
  # -------------------------------------------------------------- #
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - develop
      - main

# ================================================================ #
#                          채팅 설정                                  #
# ================================================================ #
chat:
  auto_reply: true

# ================================================================ #
#                        지식 베이스 설정                              #
# ================================================================ #
knowledge_base:
  web_search:
    enabled: true   # 주택임대차보호법, 전세사기 예방, 등기부·특약 용어 참조용
  code_guidelines:
    enabled: true   # CLAUDE.md, AGENTS.md 등 팀 규칙 반영
